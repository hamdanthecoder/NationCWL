<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}NationCWL{% endblock %} — Signup Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root {
      --ink: #0a0a0f;
      --ink-light: #1c1c2e;
      --surface: #f4f2ee;
      --surface-2: #eae7e0;
      --accent: #c84b31;
      --accent-2: #e8703a;
      --gold: #d4a843;
      --muted: #7a7570;
      --white: #fdfcfa;
      --border: #d8d3cb;
      --success: #2d7a4f;
      --error: #c0392b;
      --info: #2874a6;
      --radius: 12px;
      --shadow: 0 2px 20px rgba(10,10,15,0.08);
      --shadow-lg: 0 8px 48px rgba(10,10,15,0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Sidebar ── */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform 0.3s ease;
    }
    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-logo .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--white);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .sidebar-logo .brand span { color: var(--accent); }
    .sidebar-logo .tagline {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      font-weight: 300;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .sidebar-nav { flex: 1; padding: 20px 12px; }
    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      padding: 0 12px;
      margin: 16px 0 8px;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      transition: all 0.2s;
      margin-bottom: 2px;
    }
    .nav-link:hover, .nav-link.active {
      background: rgba(255,255,255,0.07);
      color: var(--white);
    }
    .nav-link.active { color: var(--accent-2); font-weight: 500; }
    .nav-link i { width: 18px; text-align: center; font-size: 14px; }
    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .admin-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      background: rgba(255,255,255,0.05);
    }
    .admin-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 14px; color: white; flex-shrink: 0;
    }
    .admin-info .name { font-size: 13px; font-weight: 500; color: var(--white); }
    .admin-info .role { font-size: 11px; color: rgba(255,255,255,0.35); }
    .logout-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; width: 100%; margin-top: 8px;
      padding: 9px; border-radius: 8px; border: none;
      background: rgba(200,75,49,0.15); color: var(--accent-2);
      font-size: 13px; cursor: pointer; text-decoration: none;
      transition: background 0.2s;
    }
    .logout-btn:hover { background: rgba(200,75,49,0.28); }

    /* ── Main ── */
    .main {
      margin-left: 260px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 36px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--ink);
    }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .content { padding: 36px; flex: 1; }

    /* ── Cards ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 16px;
    }
    .card-body { padding: 24px; }

    /* ── Stats ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card.s1::before { background: var(--accent); }
    .stat-card.s2::before { background: var(--gold); }
    .stat-card.s3::before { background: var(--success); }
    .stat-card.s4::before { background: var(--info); }
    .stat-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-bottom: 14px;
    }
    .stat-card.s1 .stat-icon { background: rgba(200,75,49,0.1); color: var(--accent); }
    .stat-card.s2 .stat-icon { background: rgba(212,168,67,0.1); color: var(--gold); }
    .stat-card.s3 .stat-icon { background: rgba(45,122,79,0.1); color: var(--success); }
    .stat-card.s4 .stat-icon { background: rgba(40,116,166,0.1); color: var(--info); }
    .stat-value { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; line-height: 1; color: var(--ink); }
    .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 400; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid rgba(216,211,203,0.5); transition: background 0.15s; }
    tbody tr:hover { background: var(--surface); }
    tbody td { padding: 14px 16px; font-size: 14px; }
    tbody tr:last-child { border-bottom: none; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .badge-month { background: rgba(200,75,49,0.1); color: var(--accent); }
    .badge-admin { background: rgba(40,116,166,0.1); color: var(--info); }
    .badge-super { background: rgba(212,168,67,0.12); color: #a07828; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 8px; border: none;
      font-size: 14px; font-weight: 500; cursor: pointer;
      text-decoration: none; transition: all 0.2s; line-height: 1;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #b03e27; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--ink); }
    .btn-ghost:hover { background: var(--surface); }
    .btn-danger { background: rgba(192,57,43,0.1); color: var(--error); border: 1px solid rgba(192,57,43,0.2); }
    .btn-danger:hover { background: rgba(192,57,43,0.2); }
    .btn-sm { padding: 7px 12px; font-size: 13px; }
    .btn-icon { padding: 8px; border-radius: 8px; }

    /* ── Forms ── */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }
    .form-control {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: inherit;
      background: var(--white); color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,75,49,0.12); }
    select.form-control { cursor: pointer; }
    textarea.form-control { resize: vertical; min-height: 80px; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: var(--surface);
    }
    .upload-zone:hover, .upload-zone.dragging {
      border-color: var(--accent);
      background: rgba(200,75,49,0.04);
    }
    .upload-zone i { font-size: 36px; color: var(--muted); margin-bottom: 12px; display: block; }
    .upload-zone .uz-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 16px; color: var(--ink); }
    .upload-zone .uz-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .upload-zone input[type=file] { display: none; }

    /* ── Alerts ── */
    .flash-messages { margin-bottom: 24px; }
    .alert {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 18px; border-radius: 10px;
      font-size: 14px; margin-bottom: 10px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
    .alert-success { background: rgba(45,122,79,0.1); color: #1d5f3a; border: 1px solid rgba(45,122,79,0.2); }
    .alert-error { background: rgba(192,57,43,0.1); color: var(--error); border: 1px solid rgba(192,57,43,0.2); }
    .alert-info { background: rgba(40,116,166,0.1); color: #1a5c8a; border: 1px solid rgba(40,116,166,0.2); }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,10,15,0.5); backdrop-filter: blur(4px);
      z-index: 999; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 16px;
      width: 100%; max-width: 480px;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: none; } }
    .modal-header {
      padding: 24px 28px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); padding: 4px; }
    .modal-body { padding: 24px 28px; }
    .modal-footer { padding: 16px 28px 24px; display: flex; gap: 12px; justify-content: flex-end; }

    /* ── Misc ── */
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-state i { font-size: 48px; color: var(--border); margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--muted); }
    .empty-state p { font-size: 14px; color: var(--muted); margin-top: 6px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .text-muted { color: var(--muted); }
    .text-sm { font-size: 13px; }
    .fw-600 { font-weight: 600; }
    .mt-0 { margin-top: 0; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; }
      .content { padding: 20px; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script>
  // Show/hide password toggle
  function togglePassword(fieldId, iconId) {
    var field = document.getElementById(fieldId);
    var icon = document.getElementById(iconId);
    if (!field || !icon) return;
    if (field.type === 'password') {
      field.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      field.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }

  // Show/hide password toggle
  function togglePassword(fieldId, iconId) {
    var field = document.getElementById(fieldId);
    var icon = document.getElementById(iconId);
    if (!field || !icon) return;
    if (field.type === 'password') {
      field.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      field.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }

  // Show/hide password toggle — works on any page
  function togglePassword(fieldId, iconId) {
    var field = document.getElementById(fieldId);
    var icon = document.getElementById(iconId);
    if (!field || !icon) return;
    if (field.type === 'password') {
      field.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      field.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }

  // Drag-and-drop upload zone
  document.querySelectorAll('.upload-zone').forEach(zone => {
    const input = zone.querySelector('input[type=file]');
    zone.addEventListener('click', () => input && input.click());
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragging'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragging'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('dragging');
      if (input && e.dataTransfer.files.length) {
        input.files = e.dataTransfer.files;
        const name = e.dataTransfer.files[0].name;
        zone.querySelector('.uz-title').textContent = name;
        zone.querySelector('.uz-sub').textContent = 'File ready to upload';
      }
    });
    if (input) input.addEventListener('change', () => {
      if (input.files.length) {
        zone.querySelector('.uz-title').textContent = input.files[0].name;
        zone.querySelector('.uz-sub').textContent = 'File ready to upload';
      }
    });
  });

  // Auto-dismiss alerts
  setTimeout(() => {
    document.querySelectorAll('.alert').forEach(a => {
      a.style.transition = 'opacity 0.4s';
      a.style.opacity = '0';
      setTimeout(() => a.remove(), 400);
    });
  }, 4000);

  // Toggle show/hide password
  function togglePassword(fieldId, iconId) {
    var field = document.getElementById(fieldId);
    var icon = document.getElementById(iconId);
    if (!field || !icon) return;
    if (field.type === 'password') {
      field.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      field.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }

  // Modal
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
